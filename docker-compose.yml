services:
  superapp-smoke:
    build:
      context: .
      dockerfile: Dockerfile.verify
    entrypoint: ["cargo", "run", "--locked", "-p", "qivxif-superapp", "--", "smoke"]
    environment:
      CARGO_TARGET_DIR: /target
      QIVXIF_STATE_DIR: /tmp/qivxif-state
    volumes:
      - .:/workspace:ro
      - cargo-registry:/usr/local/cargo/registry
      - target-cache:/target

volumes:
  cargo-registry:
  target-cache:
