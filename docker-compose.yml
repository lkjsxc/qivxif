services:
  qivxif:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      RUST_LOG: qivxif=info
      QIVXIF_BIND: 0.0.0.0:8080
      QIVXIF_DATA_DIR: /data
      QIVXIF_DATABASE_FILE: /data/qivxif.redb
      QIVXIF_STATIC_DIR: /app/static
      QIVXIF_COOKIE_SECURE: "false"
    ports:
      - "8080:8080"
    volumes:
      - qivxif-data:/data

  server-smoke:
    build:
      context: .
      dockerfile: Dockerfile.verify
    entrypoint: ["sh", "/workspace/scripts/server-smoke.sh"]
    environment:
      CARGO_TARGET_DIR: /target
      QIVXIF_DATA_DIR: /tmp/qivxif-data
      QIVXIF_DATABASE_FILE: /tmp/qivxif-data/qivxif.redb
      QIVXIF_STATIC_DIR: /workspace/apps/qivxif-web/dist
    volumes:
      - .:/workspace:ro
      - cargo-registry:/usr/local/cargo/registry
      - target-cache:/target

volumes:
  qivxif-data:
  cargo-registry:
  target-cache:
